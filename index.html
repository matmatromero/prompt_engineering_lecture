<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mastery of Prompt Engineering</title>
  <meta name="description"
    content="An interactive 4-hour workshop on mastering prompt engineering with LLMs. From fundamentals to advanced techniques." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="/style.css" />
</head>

<body>
  <div id="particles-bg"></div>

  <div id="presentation">
    <header id="top-bar">
      <div class="schedule-indicator">
        <span class="current-time" id="clock">8:00 AM</span>
        <span class="divider">·</span>
        <span class="current-section" id="section-label">Welcome</span>
      </div>
      <div class="progress-container">
        <div class="progress-bar" id="progress-bar"></div>
      </div>
      <div class="slide-counter" id="slide-counter">1 / 56</div>
    </header>

    <main id="slide-container"></main>

    <nav id="nav-controls">
      <button class="nav-btn" id="home-btn" aria-label="First slide">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M11 19l-7-7 7-7M20 19l-7-7 7-7" />
        </svg>
      </button>
      <button class="nav-btn" id="jump-btn" aria-label="Jump to slide">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"></circle>
          <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
        </svg>
      </button>
      <button class="nav-btn" id="prev-btn" aria-label="Previous slide">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M15 18l-6-6 6-6" />
        </svg>
      </button>
      <button class="nav-btn" id="next-btn" aria-label="Next slide">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M9 18l6-6-6-6" />
        </svg>
      </button>
      <button class="nav-btn" id="end-btn" aria-label="Last slide">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M13 5l7 7-7 7M4 5l7 7-7 7" />
        </svg>
      </button>
    </nav>

    <!-- Jump Modal -->
    <div id="jump-modal" class="modal-overlay">
      <div class="modal-content">
        <h3>Jump to Slide</h3>
        <p>Enter a slide number (1 to <span id="jump-max-slide">?</span>)</p>
        <div class="jump-input-group">
          <input type="number" id="jump-input" min="1" placeholder="Slide #" />
          <button id="jump-submit" class="spin-btn">Go</button>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="/main.js"></script>
</body>

</html>
